{{ define "title" }}{{ .Title }} | {{ site.Title }}{{ end }}

{{ define "main" }}
<main class="container-main py-14">
  <div class="max-w-3xl">
    <h1 class="text-4xl font-semibold tracking-tight text-stone-950">{{ .Title }}</h1>

    {{ $terms := .Pages }}
    {{ if gt (len $terms) 0 }}
      <ul class="mt-10 space-y-3">
        {{ range $terms }}
          <li>
            <a class="no-underline hover:underline" href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
            <span class="text-sm text-stone-600">({{ len .Pages }})</span>
          </li>
        {{ end }}
      </ul>
    {{ else }}
      <p class="mt-10 text-stone-700">No hay términos todavía.</p>
    {{ end }}
  </div>
</main>
{{ end }}
