<!-- Animated Feature Icons Collection -->

<!-- 70-20-10 Model Icon -->
<div class="feature-icon-container inline-block">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" class="w-32 h-32">
    <defs>
      <linearGradient id="pieGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#d97757;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#c26645;stop-opacity:1" />
      </linearGradient>
      <linearGradient id="pieGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#9ca3af;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#6b6b6b;stop-opacity:1" />
      </linearGradient>
    </defs>

    <!-- Background Circle -->
    <circle cx="100" cy="100" r="80" fill="rgba(217, 119, 87, 0.05)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="0s"/>
    </circle>

    <!-- 70% Segment (Experience) -->
    <path d="M 100,100 L 100,20 A 80,80 0 1,1 36.4,145.6 Z"
          fill="url(#pieGradient1)"
          opacity="0"
          transform="rotate(0 100 100)">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="0.3s"/>
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 100 100"
        to="252 100 100"
        dur="1.5s"
        fill="freeze"
        begin="0.3s"/>
    </path>

    <!-- 20% Segment (Mentoring) -->
    <path d="M 100,100 L 36.4,145.6 A 80,80 0 0,1 72.7,23.6 Z"
          fill="url(#pieGradient2)"
          opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="1.8s"/>
    </path>

    <!-- 10% Segment (Coursework) -->
    <path d="M 100,100 L 72.7,23.6 A 80,80 0 0,1 100,20 Z"
          fill="#e5e7eb"
          opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="2.1s"/>
    </path>

    <!-- Center Labels -->
    <g opacity="0">
      <text x="100" y="95" font-size="32" fill="#d97757" text-anchor="middle" font-weight="700">70</text>
      <text x="100" y="115" font-size="14" fill="#131314" text-anchor="middle" font-weight="600">20-10</text>
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="2.4s"/>
    </g>
  </svg>
</div>

<!-- AI Brain Icon -->
<div class="feature-icon-container inline-block ml-8">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" class="w-32 h-32">
    <defs>
      <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#d97757;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#c26645;stop-opacity:1" />
      </linearGradient>
    </defs>

    <!-- Brain outline -->
    <g opacity="0">
      <!-- Left hemisphere -->
      <path d="M 70,60 Q 40,60 40,90 Q 40,110 50,120 Q 55,125 60,125 L 60,140 Q 60,160 80,160 Q 90,160 95,150"
            fill="none"
            stroke="url(#brainGradient)"
            stroke-width="4"
            stroke-linecap="round"/>

      <!-- Right hemisphere -->
      <path d="M 130,60 Q 160,60 160,90 Q 160,110 150,120 Q 145,125 140,125 L 140,140 Q 140,160 120,160 Q 110,160 105,150"
            fill="none"
            stroke="url(#brainGradient)"
            stroke-width="4"
            stroke-linecap="round"/>

      <!-- Top connection -->
      <path d="M 70,60 Q 100,50 130,60"
            fill="none"
            stroke="url(#brainGradient)"
            stroke-width="4"
            stroke-linecap="round"/>

      <!-- Bottom connection -->
      <path d="M 95,150 Q 100,155 105,150"
            fill="none"
            stroke="url(#brainGradient)"
            stroke-width="4"
            stroke-linecap="round"/>

      <animate attributeName="opacity" from="0" to="1" dur="0.8s" fill="freeze" begin="0.2s"/>
    </g>

    <!-- Neural connections (animated dots) -->
    <g class="neural-dots">
      <circle cx="60" cy="80" r="0" fill="#d97757">
        <animate attributeName="r" values="0;4;0" dur="2s" repeatCount="indefinite" begin="1s"/>
      </circle>
      <circle cx="140" cy="80" r="0" fill="#d97757">
        <animate attributeName="r" values="0;4;0" dur="2s" repeatCount="indefinite" begin="1.3s"/>
      </circle>
      <circle cx="100" cy="70" r="0" fill="#d97757">
        <animate attributeName="r" values="0;4;0" dur="2s" repeatCount="indefinite" begin="1.6s"/>
      </circle>
      <circle cx="75" cy="110" r="0" fill="#d97757">
        <animate attributeName="r" values="0;4;0" dur="2s" repeatCount="indefinite" begin="1.9s"/>
      </circle>
      <circle cx="125" cy="110" r="0" fill="#d97757">
        <animate attributeName="r" values="0;4;0" dur="2s" repeatCount="indefinite" begin="2.2s"/>
      </circle>
    </g>

    <!-- AI Label -->
    <g opacity="0">
      <rect x="70" y="40" width="60" height="20" rx="10" fill="#d97757"/>
      <text x="100" y="54" font-size="12" fill="white" text-anchor="middle" font-weight="700">AI</text>
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="1s"/>
    </g>
  </svg>
</div>

<!-- Privacy Shield Icon -->
<div class="feature-icon-container inline-block ml-8">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" class="w-32 h-32">
    <defs>
      <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#d97757;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#c26645;stop-opacity:1" />
      </linearGradient>
    </defs>

    <!-- Shield outline -->
    <path d="M 100,30 L 140,45 Q 150,50 150,60 L 150,100 Q 150,130 140,145 Q 130,160 100,170 Q 70,160 60,145 Q 50,130 50,100 L 50,60 Q 50,50 60,45 Z"
          fill="url(#shieldGradient)"
          opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" fill="freeze" begin="0.2s"/>
    </path>

    <!-- Checkmark -->
    <g opacity="0">
      <polyline points="75,100 95,120 130,75"
                fill="none"
                stroke="white"
                stroke-width="8"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-dasharray="100"
                stroke-dashoffset="100">
        <animate attributeName="stroke-dashoffset" from="100" to="0" dur="0.8s" fill="freeze" begin="0.8s"/>
      </polyline>
      <animate attributeName="opacity" from="0" to="1" dur="0.1s" fill="freeze" begin="0.8s"/>
    </g>

    <!-- Lock icon at top -->
    <g opacity="0">
      <rect x="92" y="42" width="16" height="12" rx="2" fill="white"/>
      <path d="M 95,42 L 95,38 Q 95,34 100,34 Q 105,34 105,38 L 105,42"
            fill="none"
            stroke="white"
            stroke-width="2"/>
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="1.6s"/>
    </g>

    <!-- Pulsing ring -->
    <circle cx="100" cy="100" r="70" fill="none" stroke="rgba(217, 119, 87, 0.3)" stroke-width="2" opacity="0">
      <animate attributeName="r" values="70;85;70" dur="3s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite" begin="2s"/>
    </circle>
  </svg>
</div>

<style>
.feature-icon-container {
  animation: bounceIn 1s ease-out;
}

@keyframes bounceIn {
  0% {
    opacity: 0;
    transform: scale(0.3);
  }
  50% {
    opacity: 1;
    transform: scale(1.05);
  }
  70% {
    transform: scale(0.9);
  }
  100% {
    transform: scale(1);
  }
}
</style>
