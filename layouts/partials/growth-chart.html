<!-- Growth Line Chart SVG -->
<div class="growth-chart-container">
  <svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg" class="w-full h-auto">
    <defs>
      <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#d97757;stop-opacity:0.8" />
        <stop offset="100%" style="stop-color:#d97757;stop-opacity:1" />
      </linearGradient>
      <linearGradient id="areaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#d97757;stop-opacity:0.3" />
        <stop offset="100%" style="stop-color:#d97757;stop-opacity:0.05" />
      </linearGradient>
      <filter id="dropShadow">
        <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
        <feOffset dx="0" dy="2" result="offsetblur"/>
        <feComponentTransfer>
          <feFuncA type="linear" slope="0.2"/>
        </feComponentTransfer>
        <feMerge>
          <feMergeNode/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>

    <!-- Background Grid -->
    <g stroke="rgba(0,0,0,0.05)" stroke-width="1">
      <line x1="80" y1="50" x2="650" y2="50"/>
      <line x1="80" y1="125" x2="650" y2="125"/>
      <line x1="80" y1="200" x2="650" y2="200"/>
      <line x1="80" y1="275" x2="650" y2="275"/>
      <line x1="80" y1="350" x2="650" y2="350"/>
    </g>

    <!-- Y-axis Labels -->
    <text x="50" y="55" font-size="12" fill="#9ca3af" text-anchor="end">100h</text>
    <text x="50" y="130" font-size="12" fill="#9ca3af" text-anchor="end">75h</text>
    <text x="50" y="205" font-size="12" fill="#9ca3af" text-anchor="end">50h</text>
    <text x="50" y="280" font-size="12" fill="#9ca3af" text-anchor="end">25h</text>
    <text x="50" y="355" font-size="12" fill="#9ca3af" text-anchor="end">0h</text>

    <!-- X-axis Labels -->
    <text x="130" y="375" font-size="12" fill="#6b6b6b" text-anchor="middle">Q1</text>
    <text x="270" y="375" font-size="12" fill="#6b6b6b" text-anchor="middle">Q2</text>
    <text x="410" y="375" font-size="12" fill="#6b6b6b" text-anchor="middle">Q3</text>
    <text x="550" y="375" font-size="12" fill="#6b6b6b" text-anchor="middle">Q4</text>

    <!-- Area under curve (gradient fill) -->
    <path d="M 80,275 L 130,275 L 270,215 L 410,131 L 550,59 L 550,350 L 80,350 Z"
          fill="url(#areaGradient)"
          opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="1s" fill="freeze" begin="0.5s"/>
    </path>

    <!-- Main Growth Line (Without Manual IDP) -->
    <path d="M 80,275 L 130,275 L 270,215 L 410,131 L 550,59"
          fill="none"
          stroke="url(#lineGradient)"
          stroke-width="4"
          stroke-linecap="round"
          stroke-linejoin="round"
          filter="url(#dropShadow)"
          stroke-dasharray="600"
          stroke-dashoffset="600">
      <animate attributeName="stroke-dashoffset" from="600" to="0" dur="2s" fill="freeze" begin="0.5s"/>
    </path>

    <!-- Data Points (circles) -->
    <g class="data-points">
      <!-- Point 1 -->
      <circle cx="130" cy="275" r="0" fill="#d97757" stroke="white" stroke-width="3">
        <animate attributeName="r" from="0" to="6" dur="0.3s" fill="freeze" begin="0.8s"/>
      </circle>
      <g opacity="0">
        <rect x="100" y="240" width="60" height="28" rx="4" fill="#131314" opacity="0.9"/>
        <text x="130" y="258" font-size="11" fill="white" text-anchor="middle" font-weight="600">25h saved</text>
        <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="2.8s"/>
      </g>

      <!-- Point 2 -->
      <circle cx="270" cy="215" r="0" fill="#d97757" stroke="white" stroke-width="3">
        <animate attributeName="r" from="0" to="6" dur="0.3s" fill="freeze" begin="1.2s"/>
      </circle>
      <g opacity="0">
        <rect x="240" y="180" width="60" height="28" rx="4" fill="#131314" opacity="0.9"/>
        <text x="270" y="198" font-size="11" fill="white" text-anchor="middle" font-weight="600">45h saved</text>
        <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="3.2s"/>
      </g>

      <!-- Point 3 -->
      <circle cx="410" cy="131" r="0" fill="#d97757" stroke="white" stroke-width="3">
        <animate attributeName="r" from="0" to="6" dur="0.3s" fill="freeze" begin="1.6s"/>
      </circle>
      <g opacity="0">
        <rect x="380" y="96" width="60" height="28" rx="4" fill="#131314" opacity="0.9"/>
        <text x="410" y="114" font-size="11" fill="white" text-anchor="middle" font-weight="600">73h saved</text>
        <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="3.6s"/>
      </g>

      <!-- Point 4 -->
      <circle cx="550" cy="59" r="0" fill="#d97757" stroke="white" stroke-width="3">
        <animate attributeName="r" from="0" to="6" dur="0.3s" fill="freeze" begin="2s"/>
      </circle>
      <g opacity="0">
        <rect x="520" y="24" width="60" height="28" rx="4" fill="#d97757" opacity="1"/>
        <text x="550" y="42" font-size="11" fill="white" text-anchor="middle" font-weight="700">95h saved!</text>
        <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="4s"/>
      </g>
    </g>

    <!-- Legend -->
    <g opacity="0">
      <rect x="480" y="280" width="140" height="50" rx="8" fill="rgba(250, 249, 240, 0.95)" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
      <line x1="495" y1="298" x2="515" y2="298" stroke="#d97757" stroke-width="3"/>
      <text x="525" y="302" font-size="12" fill="#131314" font-weight="600">Time Saved</text>
      <text x="495" y="320" font-size="10" fill="#6b6b6b">per month (hours)</text>
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="2.5s"/>
    </g>

    <!-- Title -->
    <g opacity="0">
      <text x="350" y="20" font-size="18" fill="#131314" text-anchor="middle" font-weight="700">
        Time Savings Over Time
      </text>
      <text x="350" y="38" font-size="12" fill="#6b6b6b" text-anchor="middle">
        Average HR team with 100 employees
      </text>
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" fill="freeze" begin="0s"/>
    </g>
  </svg>
</div>

<style>
.growth-chart-container {
  animation: slideInUp 0.8s ease-out;
}

@keyframes slideInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
